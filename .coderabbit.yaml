chat:
    art: false
    allow_non_org_members: true
    auto_reply: true
    integrations:
        jira:
            usage: disabled
        linear:
            usage: disabled
knowledge_base:
    opt_out: false
    web_search:
        enabled: true
    code_guidelines:
        enabled: true
        filePatterns:
            - "docs/laws/*.md"
            - "docs/standards/*.md"
            - "docs/stacks/*/README.md"
    learnings:
        scope: local
        approval_delay: 0
    issues:
        scope: local
    jira:
        usage: disabled
    linear:
        usage: disabled
    pull_requests:
        scope: local
    mcp:
        usage: auto
    automatic_repository_linking: false
    linked_repositories:
        - repository: bsamiee/Rasm
          instructions: >-
            Doctrine master for the shared stack and docgen law; skill bundles mirror byte-identical across the estate — flag divergence in mirrored surfaces.
        - repository: bsamiee/Maghz
          instructions: >-
            VPS second-brain consumer of Forge machine rails; provisioning contract and launcher changes ripple here.
issue_enrichment:
    auto_enrich:
        enabled: true
    planning:
        enabled: false
    labeling:
        auto_apply_labels: false